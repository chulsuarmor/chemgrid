name: Urgent ChemGrid rc1 onefile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller rdkit PyQt6 numpy scipy matplotlib networkx requests python-dotenv PyOpenGL reportlab pillow pandas
      - name: Verify imports
        shell: pwsh
        run: |
          python -c "import rdkit, PyQt6, numpy, matplotlib, PyInstaller; print('imports ok')"
      - name: Build onefile ChemGrid.exe
        shell: pwsh
        run: |
          Copy-Item -Force 'src/app/logo.ico' 'tools/logo.ico'
          python -m PyInstaller tools/ChemGrid.spec --clean --noconfirm
          if (-not (Test-Path 'dist/ChemGrid.exe')) { throw 'dist/ChemGrid.exe not found' }
          $exe = Get-Item 'dist/ChemGrid.exe'
          if ($exe.Length -lt 100MB) { throw "ChemGrid.exe too small; likely failed stub: $($exe.Length) bytes" }
          $archiveNames = python -m PyInstaller.utils.cliutils.archive_viewer 'dist/ChemGrid.exe' --list --brief
          $archiveRecursiveNames = python -m PyInstaller.utils.cliutils.archive_viewer 'dist/ChemGrid.exe' --list --recursive --brief
          foreach ($asset in @('logo.png','logo.ico','undo.png','redo.png','hand.png','select.png','pen.png','eraser.png','bond.png')) {
            $expected = "_internal\$asset"
            $found = $archiveNames | Where-Object { $_.Trim().Replace('/', '\') -eq $expected }
            if (-not $found) {
              throw "ChemGrid.exe missing bundled UI asset: $expected"
            }
          }
          foreach ($module in @('lead_optimizer','popup_lead_optimizer','admet_predictor','docking_data','docking_interface','drug_screening','rdkit.Chem.QED','rdkit.Chem.Crippen','rdkit.RDConfig')) {
            $foundModule = $archiveRecursiveNames | Where-Object { $_.Trim() -eq $module }
            if (-not $foundModule) {
              throw "ChemGrid.exe missing lead/RDKit module: $module"
            }
          }
          $selfTest = Join-Path $env:RUNNER_TEMP 'chemgrid_rdkit_lead_self_test.json'
          & 'dist/ChemGrid.exe' --self-test-rdkit-lead --json-out $selfTest
          if ($LASTEXITCODE -ne 0) { throw "ChemGrid RDKit/lead self-test failed with exit $LASTEXITCODE" }
          $selfPayload = Get-Content -Raw -Path $selfTest | ConvertFrom-Json
          if (-not $selfPayload.safe_to_claim_rdkit_lead_import) {
            throw "ChemGrid RDKit/lead self-test did not authorize import claim"
          }
          $exe | Format-List FullName,Length,LastWriteTime
          Get-FileHash -Algorithm SHA256 'dist/ChemGrid.exe'
      - name: Upload rc1 ChemGrid.exe asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v1.0.0-lite-rc1 dist/ChemGrid.exe --repo ${{ github.repository }} --clobber
